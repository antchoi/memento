name: Publish Python package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-build:
    name: Verify and build package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and release tooling
        run: python -m pip install --upgrade -e '.[dev,release]'

      - name: Run tests and static checks
        run: |
          python -m pytest -q
          python -m ruff check .
          python -m compileall -q src tests
          memento doctor --json
          memento sample-smoke --workspace /tmp/memento-release-smoke --json

      - name: Build source and wheel distributions
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: verify-build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
