acceptance_criteria:
- 'AC01_repo_bootstrap — Repository contains README.md, pyproject.toml, src package, tests package, docs directory, bundled skills directory, .gitignore, and this seed under .ouroboros/seeds/. — Verification: File existence check plus package import smoke test.'
- 'AC02_plugin_registration — Plugin exposes a documented register(ctx) or equivalent Hermes plugin entry point that can register command handlers without importing unavailable runtime-only dependencies at module import time. — Verification: Unit test imports plugin and invokes registration against a fake context.'
- 'AC03_command_surface — init, start, plan, approve-plan, status, pause, resume, cancel, review, report, and doctor command handlers exist and return structured results. — Verification: Unit tests call each handler with fake adapters and assert success/error shape.'
- 'AC04_draft_to_canonical_plan — Execution cannot begin from a draft plan; approve-plan promotes a reviewed draft to canonical and records an audit event. — Verification: State transition tests for rejected draft execution and successful canonical promotion.'
- 'AC05_durable_state — Runs, plans, tasks, review gates, evidence, and audit events persist across process restarts using the local fallback store. — Verification: Create state, reload adapter, assert all entities survive with stable ids.'
- 'AC06_kanban_boundary — State layer defines a Kanban adapter boundary and can run tests without a live Hermes Kanban database. — Verification: Fake Kanban adapter tests plus local fallback tests.'
- 'AC07_preflight_safety — start/execute paths perform git preflight and block destructive or ambiguous states unless explicitly overridden by a safe documented flag. — Verification: Tests simulate dirty worktree, detached HEAD, protected branch, and untracked files.'
- 'AC08_destructive_guardrails — reset --hard, git clean, force push, direct main push, and merge operations are blocked by default in generated worker instructions and command safety layer. — Verification: Static tests over generated prompts/skills plus unit tests for safety classifier.'
- 'AC09_worker_context — Worker dispatch payloads include explicit repo path, task description, acceptance criteria, safety constraints, and reporting contract; no payload relies on current chat history. — Verification: Unit test snapshots worker payloads.'
- 'AC10_review_gates — At least preflight, plan review, implementation/spec review, quality review, and final acceptance gates are represented and state transitions respect failed gates. — Verification: Gate transition tests.'
- 'AC11_reporting — status/report output is concise, Telegram-friendly, and includes goal, state, evidence, changed files, verification results, blockers, risks, and next action. — Verification: Snapshot tests for text and JSON renderers.'
- 'AC12_cancellation_pause — pause and cancel commands update state, record audit events, and report incomplete tasks and known child process handles when provided by adapters. — Verification: Unit tests with fake process/executor adapters.'
- 'AC13_bundled_skills — Bundled Sisyphus/Metis/Momus skills exist, have valid SKILL.md frontmatter, and document triggers, workflow, pitfalls, and verification. — Verification: Skill frontmatter parser test.'
- 'AC14_documentation — docs/architecture.md and docs/user-guide.md explain architecture, install/setup, command examples, safety model, state recovery, and optional executor extension. — Verification: Documentation checklist test or reviewer checklist.'
- 'AC15_no_opencode_dependency — Core tests pass without OpenCode installed and no core module imports OpenCode-specific packages. — Verification: CI/local test environment without OpenCode plus import scan.'
- 'AC16_test_suite — pytest suite passes locally and covers domain models, state, commands, safety, reporting, plugin registration, and skill validation. — Verification: python -m pytest -q.'
- 'AC17_lint_type_baseline — Project provides formatter/linter/type-check commands and current source passes the selected baseline. — Verification: ruff/pytest or documented equivalent command passes.'
- 'AC18_seed_traceability — Implementation references this Seed in README or docs and maps acceptance criteria to tests or checklist items. — Verification: README/docs contain seed path and AC mapping.'
- 'AC19_actor_input_output_runtime_closure — Seed and implementation explicitly model actors, accepted inputs, produced outputs, runtime context, MVP-required scope, and deferred/non-goal boundaries. — Verification: Documentation/schema tests assert these sections exist and command results reference the same actor/input/output vocabulary.'
- 'AC20_cron_event_to_task_only — Cron/event integration can create or update durable tasks but never executes implementation work directly. — Verification: Unit tests simulate cron/event payloads and assert Kanban/SQLite task records are created while executor adapters are not invoked.'
- 'AC21_role_last_action_visibility — status/report output includes each role''s most recent decision/action when available: Metis, Momus, Sisyphus, Hephaestus, and Hermes-Sheriff. — Verification: Snapshot tests over seeded audit/evidence state.'
- 'AC22_sqlite_fallback_contract — When Kanban is unavailable, SQLite becomes the local source of truth with equivalent Run/Plan/Task/Gate/Evidence/AuditEvent persistence semantics. — Verification: Integration test runs init/plan/approve-plan/start/status/report entirely against a temporary SQLite database with a fake-unavailable Kanban adapter.'
