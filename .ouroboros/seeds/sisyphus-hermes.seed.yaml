runtime_context:
  project_type: greenfield_standalone_plugin
  project_dir: /Users/yhchoi/workspace/sisyphus-hermes
  host_environment: Local Hermes Agent installation on macOS.
  source_of_truth: Hermes Kanban when available; project-local SQLite fallback only when Kanban is unavailable.
  core_primitives: Hermes plugin APIs, profiles, skills, Kanban, cron/event watchers, delegation/subagents, terminal/file/process tools, and messaging/reporting channels.
  explicit_non_goals:
  - cloud sync
  - paid services
  - production deployment
  - log-scraping supervision of OpenCode, Codex, Claude Code, or oh-my-openagent Sisyphus sessions
primary_users:
- name: repository_owner
  description: A developer who wants long-horizon coding work coordinated from Hermes/Telegram/CLI with durable status and review gates.
- name: sisyphus_worker
  description: A Hermes profile or spawned worker process responsible for executing scoped implementation tasks.
- name: reviewer_or_critic
  description: A Hermes profile/subagent responsible for adversarial review, acceptance-criteria checks, and safety gates.
non_goals:
- Reimplement OpenCode or depend on OpenCode internals for core behavior.
- Create a skill-only MVP as the final architecture.
- Build an opaque autonomous loop without durable task state.
- Auto-merge, force-push, or destructively rewrite user repositories.
- Require external SaaS beyond already configured Hermes/Ouroboros/model tooling.
- Store or print API keys, OAuth tokens, private SSH keys, or other secrets.
- Cloud sync, paid service integrations, or production deployment automation in the MVP.
- Let cron jobs execute implementation work directly; cron may only detect events and enqueue durable work.
- Treat OpenCode/Codex/Claude Code logs, TUI state, or process output as the Sisyphus lifecycle source of truth.
mvp_scope:
  required:
  - Standalone Hermes plugin repository at /Users/yhchoi/workspace/sisyphus-hermes.
  - Command handlers for init, start, plan, approve-plan, status, pause, resume, cancel, review, report, and doctor.
  - Observable role behavior for Metis, Momus, Sisyphus, Hephaestus, and Hermes-Sheriff through persisted decisions/actions and report output.
  - Kanban-backed durable lifecycle with SQLite fallback.
  - Append-only audit/evidence records for success, failure, blocked, and guarded operations.
  - Telegram-friendly default reporting plus structured JSON output where useful for tests.
  - Destructive git guardrails enforced in both command layer and generated worker payloads.
  deferred_but_designed:
  - Rich external executor implementations for OpenCode, Codex, and Claude Code.
  - Advanced cron automation beyond event-to-task creation.
  - Remote/cloud synchronization of lifecycle state.
  - Production deployment packaging beyond local install/developer setup.
constraints:
- 'environment: Development target is macOS with project root /Users/yhchoi/workspace/sisyphus-hermes.'
- 'environment: Plugin must be usable from a local Hermes install and must not require modifying Hermes core for the MVP unless a documented extension point is missing.'
- 'environment: Generated runtime state must stay under project-local or Hermes-approved state directories and be gitignored when not source.'
- 'architecture: Design for full Hermes plugin architecture from the outset.'
- 'architecture: {''Use Hermes-native primitives as first-class dependencies'': ''profiles, skills, Kanban, cron/event watchers, memory/session search, delegation/subagents, terminal/file tools, process management, and messaging-friendly reporting.''}'
- 'architecture: OpenCode may appear only as an optional executor peer in a later extension point, never as the core Sisyphus engine.'
- 'safety: Protect dirty worktrees before any implementation task.'
- 'safety: No git reset --hard, git clean, force push, main direct push, or merge without explicit user approval.'
- 'safety: All command execution must be scoped to a known repository/workdir.'
- 'safety: Long-running background work must have observable task state, cancellation, and status reporting.'
- 'quality: Tests and documentation are required for every public command and state transition.'
- 'quality: Acceptance criteria must be mechanically verifiable where possible.'
ontology_schema:
  name: SisyphusHermesDomain
  description: 'Hermes-native Sisyphus durable task lifecycle ontology covering runs, plans, tasks, review gates, evidence, audit events, worker roles, and executor boundaries. Entities: SisyphusRun, SisyphusPlan, SisyphusTask, ReviewGate, Evidence, AuditEvent'
  fields:
  - name: SisyphusRun
    type: object
    description: Top-level long-horizon work session initiated by a user.
    required: true
  - name: SisyphusPlan
    type: object
    description: Draft or canonical plan that gates work execution.
    required: true
  - name: SisyphusTask
    type: object
    description: A durable unit of work mapped to Hermes Kanban where possible.
    required: true
  - name: ReviewGate
    type: object
    description: A required validation checkpoint before state advancement.
    required: true
  - name: Evidence
    type: object
    description: Verifiable artifact proving progress or failure.
    required: true
  - name: AuditEvent
    type: object
    description: Append-only event for observability and recovery.
    required: true
functional_requirements:
  plugin_bootstrap:
  - Create a standalone repository with packaging metadata, source layout, tests, docs, and examples.
  - Provide an installable Hermes plugin entry point or documented local plugin registration path.
  - Include a developer setup command and smoke-test command.
  command_surface:
  - Provide user-facing commands or slash-command equivalents for: init, start, plan, approve-plan, status, pause, resume, cancel, review, report, doctor.
  - Commands must produce concise Telegram-friendly output by default and verbose machine-readable JSON when requested.
  - Commands must never require interactive TUI state to be the only source of truth.
  planning_lifecycle:
  - Implement draft-to-canonical planning inspired by oh-my-openagent/oh-my-hermes, with explicit approval or review gate before execution.
  - Record assumptions, non-goals, risks, task decomposition, acceptance criteria, and rollback/safety strategy in the plan artifact.
  - Reject execution when no canonical plan exists unless user explicitly requests a bounded spike.
  durable_state:
  - Persist runs, plans, tasks, gates, evidence, and audit events in a documented local state model.
  - Prefer Hermes Kanban as the task source of truth when available; provide a project-local fallback store if Kanban is unavailable.
  - Provide idempotent state transitions and recovery after process interruption.
  worker_orchestration:
  - Support Hermes profile workers for long-lived roles such as sisyphus, metis, momus, hephaestus, and sheriff.
  - Support delegate_task for bounded sub-reviews or research fanout.
  - Ensure every worker receives explicit scoped context; no worker may depend on hidden parent conversation state.
  review_gates:
  - Implement at least four gate types: preflight safety, plan review, implementation/spec review, and final acceptance review.
  - Failed gates must produce actionable findings and move the run/task to blocked or review, not silently continue.
  repository_safety:
  - Preflight must inspect git status, branch, remotes, untracked files, and dirty changes before implementation.
  - Any potentially destructive git operation requires explicit user confirmation and must be disabled by default.
  - The plugin must separate source changes from generated/runtime artifacts and update .gitignore recommendations.
  reporting:
  - Status reports must include current goal, current state, progress evidence, changed files, verification commands/results, blockers, risks, and next action.
  - Reports must avoid dumping raw logs unless verbose mode is requested.
  - Cancellation and pause reports must identify surviving child processes or incomplete tasks when applicable.
  optional_executor_extension:
  - Define an interface for future executor peers such as OpenCode, Codex, or Claude Code.
  - The initial implementation may include a stub but must not depend on OpenCode for core tests.
