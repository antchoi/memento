goal: Build a production-oriented Hermes Agent plugin named sisyphus-hermes that ports the useful workflow ideas of oh-my-openagent's Sisyphus/Ultraworker into a Hermes-native architecture. The plugin must treat Sisyphus as a disciplined, durable long-horizon task lifecycle rather than as an OpenCode watcher or a single opaque long-running prompt. It must provide user-facing commands and internal services for planning, starting, monitoring, reviewing, pausing, cancelling, resuming, and reporting coding work through Hermes primitives.
problem_statement: The current Hermes + OpenCode + oh-my-openagent/Sisyphus integration is brittle because Hermes can only observe OpenCode indirectly through logs, process state, and database artifacts. Agent naming, plugin loading, and TUI state can drift, causing false progress reports and failed delegation. A Hermes-native Sisyphus plugin should eliminate this mismatch by making Hermes' own Kanban board, profiles, skills, memory/session search, cron/event watchers, subagents, and terminal/file tools the source of truth.
actors:
- name: founder_user
  responsibility: Provides repository/workspace path, goal/task text, approvals, cancellation decisions, and explicit consent for any guarded operation.
- name: hermes_plugin_command_layer
  responsibility: Owns command parsing, adapter injection, structured command results, and Telegram-friendly rendering boundaries.
- name: metis_planner
  responsibility: Produces plans, risks, assumptions, questions, task decompositions, and acceptance criteria before execution.
- name: momus_reviewer
  responsibility: Critiques draft plans and implementation evidence, blocks weak assumptions, and records review gates.
- name: sisyphus_lifecycle_worker
  responsibility: Owns durable Run/Plan/Task lifecycle state and keeps long-horizon work moving through approved state transitions.
- name: hephaestus_executor
  responsibility: Executes only approved, scoped tasks through Hermes-native workers or optional executor adapters and records evidence.
- name: hermes_sheriff
  responsibility: Performs repository preflight, destructive git guardrails, audit logging, and safety-oriented status reporting.
- name: optional_external_executor_adapter
  responsibility: Future peer interface for OpenCode, Codex, or Claude Code; never the source of truth and never supervised through log scraping.
