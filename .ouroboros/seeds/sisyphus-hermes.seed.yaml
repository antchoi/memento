  criteria: Implementation would require exposing secrets or destructive repository operations.; User cancels full plugin objective.
open_questions: []
resolved_decisions:
- Hermes plugin API target will be discovered during S1/S3 bootstrap and captured behind a fake-context-testable plugin registration boundary.
- Durable fallback state is SQLite for MVP; JSON may be used only for fixtures or exported reports.
- Command surface should share one service layer and expose both plugin/slash-command handlers and a developer CLI wrapper where practical.
- Role routing is specified by role contracts and persisted decisions/actions; exact model/profile routing remains configuration, not a hard-coded implementation dependency.
